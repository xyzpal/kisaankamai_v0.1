<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kisan Kamai - Feedback</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "surface-tint": "#406657",
              "on-tertiary": "#ffffff",
              "surface-container-high": "#e5e8f0",
              "background": "#f8f9ff",
              "on-tertiary-fixed": "#2c1600",
              "secondary-fixed-dim": "#ffb693",
              "on-secondary-fixed": "#351000",
              "on-tertiary-fixed-variant": "#693c00",
              "on-primary-fixed-variant": "#284e40",
              "surface-container-low": "#f1f3fc",
              "surface-container-lowest": "#ffffff",
              "on-background": "#181c22",
              "inverse-primary": "#a6cfbd",
              "tertiary-fixed": "#ffdcbe",
              "surface-variant": "#dfe2ea",
              "error": "#ba1a1a",
              "tertiary": "#321900",
              "inverse-surface": "#2d3137",
              "on-error-container": "#93000a",
              "tertiary-container": "#4f2c00",
              "on-surface-variant": "#414844",
              "on-secondary-fixed-variant": "#75340e",
              "on-surface": "#181c22",
              "on-secondary": "#ffffff",
              "primary-fixed-dim": "#a6cfbd",
              "secondary": "#934a24",
              "tertiary-fixed-dim": "#ffb870",
              "surface-container": "#ebeef6",
              "surface-dim": "#d7dae2",
              "secondary-fixed": "#ffdbcc",
              "surface": "#f8f9ff",
              "on-primary-fixed": "#002117",
              "on-primary-container": "#7ea594",
              "primary-container": "#143b2e",
              "surface-container-highest": "#dfe2ea",
              "inverse-on-surface": "#eef1f9",
              "outline": "#717974",
              "primary": "#00251a",
              "on-secondary-container": "#783610",
              "surface-bright": "#f8f9ff",
              "error-container": "#ffdad6",
              "secondary-container": "#ffa274",
              "outline-variant": "#c1c8c3",
              "primary-fixed": "#c2ecd9",
              "on-tertiary-container": "#da8b31"
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px"
            },
            fontFamily: {
              headline: ["Manrope", "sans-serif"],
              body: ["Manrope", "sans-serif"],
              label: ["Inter", "sans-serif"]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background text-on-background font-body antialiased selection:bg-primary selection:text-on-primary">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<!-- Header (Shared) -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-surface-variant px-10 py-3 bg-surface z-50 sticky top-0">
<div class="flex items-center gap-4 text-primary">
<div class="size-6">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-primary text-xl font-headline font-bold leading-tight tracking-[-0.015em]">Kisan Kamai</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<nav class="flex items-center gap-9">
<a class="text-on-surface hover:text-primary transition-colors text-sm font-label font-medium leading-normal" href="#">Home / मुख्यपृष्ठ</a>
<a class="text-on-surface hover:text-primary transition-colors text-sm font-label font-medium leading-normal" href="#">Services / सेवा</a>
<a class="text-on-surface hover:text-primary transition-colors text-sm font-label font-medium leading-normal" href="#">About Us / आमच्याबद्दल</a>
<a class="text-primary font-label font-medium text-sm leading-normal border-b-2 border-primary pb-1" href="#">Contact / संपर्क</a>
</nav>
</div>
</header>
<main class="flex-grow flex flex-col items-center pb-20">
<!-- Hero Section -->
<section class="w-full max-w-[1200px] px-4 md:px-8 py-8 md:py-12 mt-4">
<div class="relative w-full rounded-2xl overflow-hidden bg-surface-container shadow-sm border border-surface-variant flex flex-col md:flex-row min-h-[300px]">
<div class="flex-1 p-8 md:p-12 flex flex-col justify-center bg-primary-container z-10">
<h1 class="text-on-primary font-headline text-3xl md:text-5xl font-bold leading-tight mb-4">
                            Share Your Feedback<br/>
<span class="text-primary-fixed font-normal text-2xl md:text-4xl block mt-2">तुमचे अभिप्राय कळवा</span>
</h1>
<p class="text-on-primary-container font-body text-base md:text-lg max-w-md">
                            Help us improve Kisan Kamai for every farmer and equipment owner.
                        </p>
</div>
<div class="absolute inset-0 md:relative md:w-[45%] opacity-30 md:opacity-100 bg-cover bg-center" data-alt="Realistic Western Maharashtra agricultural scene at sunset, modern tractor in a lush field, cinematic lighting, premium quality" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA8Xr4lg_H-izzJrrcejcw45UXzCzstoO5DhWjUiCzPQl7r63nMHpKCjm44kOpnkjjrxBxEp8nX_pMfD9JQmAqaiGoatR1ac_-I4kCOjqvQPs2T0Zui_OLEYTlWAVcK9TUr6oMbabE9LTHbEMEK6Ylb6QYzY1UFFQeWAUtxRlOm99rUnxMQ_7mrC5RDTik0hmPYx-a2UpU5hbsvrf4L5QWP_grh7vLxy_ou4OoZV81SSUms7UyrSTFhtTOUNQ4TuEqOpxNG8U9DstKz');">
</div>
</div>
</section>
<!-- Main Form Section -->
<section class="w-full max-w-[800px] px-4 md:px-8">
<div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-surface-variant p-6 md:p-10">
<form class="flex flex-col gap-8">
<!-- Personal Info Group -->
<fieldset class="flex flex-col gap-6">
<legend class="sr-only">Personal Information</legend>
<div class="flex flex-col md:flex-row gap-6">
<div class="flex-1 flex flex-col gap-2">
<label class="font-headline font-semibold text-on-surface text-base" for="fullName">
                                        Full Name / पूर्ण नाव <span class="text-error">*</span>
</label>
<input class="form-input w-full rounded-lg border border-outline bg-surface focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 font-body text-on-surface" id="fullName" placeholder="Enter your full name" type="text"/>
</div>
<div class="flex-1 flex flex-col gap-2">
<label class="font-headline font-semibold text-on-surface text-base" for="mobileNumber">
                                        Mobile Number / मोबाईल नंबर <span class="text-error">*</span>
</label>
<input class="form-input w-full rounded-lg border border-outline bg-surface focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 font-body text-on-surface" id="mobileNumber" placeholder="Enter 10 digit number" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-headline font-semibold text-on-surface text-base" for="email">
                                    Email / ईमेल <span class="text-on-surface-variant font-normal text-sm">(Optional / पर्यायी)</span>
</label>
<input class="form-input w-full rounded-lg border border-outline bg-surface focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 font-body text-on-surface" id="email" placeholder="Enter your email address" type="email"/>
</div>
</fieldset>
<hr class="border-surface-variant"/>
<!-- Feedback Details Group -->
<fieldset class="flex flex-col gap-6">
<div class="flex flex-col gap-3">
<label class="font-headline font-semibold text-on-surface text-base">
                                    I am a... / मी एक... <span class="text-error">*</span>
</label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="farmer"/>
<div class="px-5 py-2.5 rounded-full border border-outline bg-surface text-on-surface font-label text-sm font-medium transition-all peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container hover:bg-surface-container-high">
                                            Farmer / शेतकरी
                                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="owner"/>
<div class="px-5 py-2.5 rounded-full border border-outline bg-surface text-on-surface font-label text-sm font-medium transition-all peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container hover:bg-surface-container-high">
                                            Equipment Owner / मालक
                                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="partner"/>
<div class="px-5 py-2.5 rounded-full border border-outline bg-surface text-on-surface font-label text-sm font-medium transition-all peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container hover:bg-surface-container-high">
                                            Partner / भागीदार
                                        </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio" value="visitor"/>
<div class="px-5 py-2.5 rounded-full border border-outline bg-surface text-on-surface font-label text-sm font-medium transition-all peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container hover:bg-surface-container-high">
                                            Visitor / अभ्यागत
                                        </div>
</label>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-headline font-semibold text-on-surface text-base" for="category">
                                    Feedback Category / अभिप्रायाची श्रेणी <span class="text-error">*</span>
</label>
<div class="relative">
<select class="form-select w-full rounded-lg border border-outline bg-surface focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 font-body text-on-surface appearance-none" id="category">
<option disabled="" selected="" value="">Select a category...</option>
<option value="website">Website Experience / वेबसाईट अनुभव</option>
<option value="booking">Booking Experience / बुकिंग अनुभव</option>
<option value="listing">Listing Experience / लिस्टिंग अनुभव</option>
<option value="support">Support Experience / सपोर्ट अनुभव</option>
<option value="payment">Payment &amp; Pricing / पेमेंट आणि किंमत</option>
<option value="suggestion">Suggestion / सूचना</option>
<option value="issue">Report an Issue / समस्येची तक्रार करा</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-headline font-semibold text-on-surface text-base" for="subject">
                                    Subject / विषय <span class="text-error">*</span>
</label>
<input class="form-input w-full rounded-lg border border-outline bg-surface focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 font-body text-on-surface" id="subject" placeholder="Brief subject of your feedback" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-headline font-semibold text-on-surface text-base" for="message">
                                    Feedback Message / संदेश <span class="text-error">*</span>
</label>
<textarea class="form-textarea w-full rounded-lg border border-outline bg-surface focus:border-primary focus:ring-1 focus:ring-primary p-4 font-body text-on-surface resize-y" id="message" placeholder="Please describe your experience or suggestion in detail..." rows="5"></textarea>
</div>
</fieldset>
<!-- Rating & Final Options -->
<fieldset class="flex flex-col gap-6">
<div class="flex flex-col gap-3">
<label class="font-headline font-semibold text-on-surface text-base">
                                    Overall Satisfaction / एकूण समाधान
                                </label>
<div class="flex gap-2">
<!-- Star Rating Visual (Static for display purposes) -->
<button class="text-outline hover:text-tertiary-container transition-colors" type="button">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="text-outline hover:text-tertiary-container transition-colors" type="button">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="text-outline hover:text-tertiary-container transition-colors" type="button">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="text-outline hover:text-tertiary-container transition-colors" type="button">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
<button class="text-outline hover:text-tertiary-container transition-colors" type="button">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
</div>
</div>
<div class="flex items-start gap-3 mt-2">
<div class="flex items-center h-6">
<input class="form-checkbox w-5 h-5 rounded border-outline text-primary focus:ring-primary bg-surface cursor-pointer" id="contactMe" type="checkbox"/>
</div>
<label class="font-body text-on-surface text-sm cursor-pointer" for="contactMe">
                                    Contact me about this feedback / <span class="text-on-surface-variant">या अभिप्रायाबाबत माझ्याशी संपर्क साधा</span>
</label>
</div>
</fieldset>
<!-- Submit Area -->
<div class="flex flex-col sm:flex-row items-center justify-between gap-6 pt-4 border-t border-surface-variant">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-xl">lock</span>
<span class="font-body text-sm">Your feedback is handled securely.</span>
</div>
<button class="w-full sm:w-auto px-8 py-3.5 bg-primary text-on-primary font-label font-bold rounded-lg hover:bg-primary/90 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary whitespace-nowrap shadow-sm" type="button">
                                Submit Feedback / सबमिट करा
                            </button>
</div>
</form>
</div>
</section>
</main>
</div>
</body></html>
